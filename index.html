<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoddha Club</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header Section -->
    <header class="sticky-header">
        <div class="logo">
            <img src="logo.png" alt="Yoddha Club Logo" class="club-logo">
            <span>Yoddha Club</span>
        </div>
        <div class="header-actions">
            <button id="darkModeToggle" class="dark-toggle-btn" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon" id="darkModeIcon"></i>
            </button>
            <a href="login.html" class="btn btn-text">Login</a>
        </div>
    </header>

    <main>
        <!-- Banner Section -->
        <section class="banner-section fade-element">
            <div class="carousel-track">
                <!-- Banners injected by JS -->
            </div>
            <div class="carousel-dots">
                <!-- Dots injected by JS -->
            </div>
        </section>

        <!-- Our Players Section -->
        <section class="section champions-section fade-element">
            <h2 class="section-title">Our Players</h2>
            <div class="horizontal-scroll" id="ourPlayersContainer">
                <!-- Dynamically populated from the database -->
            </div>
        </section>

        <!-- Club Leaderboard Section -->
        <section class="section leaderboard-section fade-element">
            <h2 class="section-title">Club Leaderboard</h2>
            
            <div class="tp-tab-pills" style="justify-content:center; margin-bottom: 2rem;">
                <button class="tp-tab-pill active" data-public-lb="punches">🥊 Punches</button>
                <button class="tp-tab-pill" data-public-lb="kicks">🦵 Kicks</button>
                <button class="tp-tab-pill" data-public-lb="conditioning">💪 Conditioning</button>
                <button class="tp-tab-pill" data-public-lb="active">🔥 Most Active</button>
            </div>

            <div id="publicLeaderboardContainer" style="max-width: 800px; margin: 0 auto; background: var(--bg-light); border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border);">
                <!-- Dynamically populated by JS -->
            </div>
        </section>

        <!-- Events Section -->
        <section class="section events-section fade-element">
            <h2 class="section-title">Upcoming Events</h2>
            <div class="cards-grid" id="publicEventsContainer">
                <!-- Dynamically populated from the database -->
            </div>
        </section>

        <!-- Fee Chart Section (NEW) -->
        <section class="section fee-chart-section fade-element">
            <h2 class="section-title">Fee Plans</h2>
            <div class="horizontal-scroll" id="feePlansContainer">
                <!-- Dynamically populated from the database -->
            </div>
        </section>

        <!-- Coaches Section -->
        <section class="section coaches-section fade-element">
            <h2 class="section-title">Our Coaches</h2>
            <div class="horizontal-scroll" id="publicCoachesContainer" style="padding-bottom: 2rem;">
                <!-- Dynamically populated from the database -->
            </div>
        </section>

        <!-- Past Events Section -->
        <section class="section past-events-section" id="pastEventsSection" style="display: none;">
            <h2 class="section-title">Past Events & Gallery</h2>
            <div class="cards-grid" id="publicPastEventsContainer">
                <!-- Dynamically populated from the database -->
            </div>
        </section>

        <!-- Location Section -->
        <section class="section location-section fade-element">
            <h2 class="section-title">Our Location</h2>
            <div class="card location-card">
                <div class="map-container">
                    <iframe src="https://www.google.com/maps?q=Yoddha+kickboxing+%26+martialarts+club+ambikapur&output=embed" width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="card-content">
                    <p class="address"><i class="fa-solid fa-map-pin"></i> Ambikapur, Chhattisgarh 497001</p>
                    <a href="https://www.google.com/maps/search/Yoddha+kickboxing+%26+martialarts+club+ambikapur" target="_blank" class="btn btn-primary btn-full" style="display:inline-block; text-align:center;"><i class="fa-solid fa-location-arrow"></i> Get Directions</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Modal -->
    <div id="footerPopupModal" class="footer-modal">
        <div class="footer-modal-overlay" id="footerModalOverlay"></div>
        <div class="footer-modal-content">
            <button class="footer-modal-close" id="closeFooterModal">&times;</button>
            <div id="footerModalBody">
                <!-- Dynamic content goes here -->
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-brand">
                <h3>YODDHA CLUB</h3>
            </div>
            <div class="footer-nav">
                <a href="javascript:void(0)" id="openAbout">About Club</a>
                <a href="javascript:void(0)" id="openContact">Contact Us</a>
                <a href="javascript:void(0)" id="openPrivacy">Privacy Policy</a>
            </div>
            <p class="footer-copyright">&copy; 2026 Yoddha Kickboxing & MMA Club. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
